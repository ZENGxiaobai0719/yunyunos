# ============================================================
# 数据模型定义
# ============================================================
components:
  schemas:
    # ---- 通用 ----
    EmptyResult:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          nullable: true
          example: null

    ErrorResult:
      type: object
      properties:
        code:
          type: integer
          example: 404
        message:
          type: string
          example: "番剧不存在"
        data:
          nullable: true
          example: null

    # ---- 分页包装 ----
    AnimePageResult:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          $ref: "#/components/schemas/PageDataAnime"

    SearchPageResult:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          $ref: "#/components/schemas/PageDataSearch"

    PageDataAnime:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/AnimeItem"
        total:
          type: integer
          example: 12
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20

    PageDataSearch:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultItem"
        total:
          type: integer
          example: 2
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20

    # ---- 番剧列表项 ----
    AnimeItem:
      type: object
      properties:
        id:
          type: integer
          description: 番剧ID
          example: 1
        title:
          type: string
          description: 标题
          example: "关于邻家的天使大人不知不觉把我惯成了废人这档子事 第二季"
        type:
          type: string
          description: 类型
          enum: [TV番组, 剧场版, OVA]
          example: "TV番组"
        status:
          type: string
          description: 连载状态
          enum: [ongoing, completed]
          example: "ongoing"
        latestEpisode:
          type: string
          description: 最新话数
          example: "06"
        airTime:
          type: string
          description: 播出时间描述
          example: "周五21:35后"
        views:
          type: integer
          description: 总播放量
          example: 110626
        coverUrl:
          type: string
          description: 封面图URL
          example: "https://img.animerce.com/cover/001.jpg"
        year:
          type: integer
          description: 播出年份
          example: 2026
        season:
          type: string
          description: 播出季度
          example: "2026春"
        rating:
          type: number
          description: 评分(1-10)
          example: 8.5

    # ---- 轮播 ----
    CarouselResult:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          type: object
          properties:
            list:
              type: array
              items:
                $ref: "#/components/schemas/CarouselItem"

    CarouselItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "关于邻家的天使大人不知不觉把我惯成了废人这档子事 第二季"
        bannerUrl:
          type: string
          description: 横幅大图URL
          example: "https://img.animerce.com/banner/001.jpg"
        description:
          type: string
          description: 简介
        type:
          type: string
          example: "TV番组"
        latestEpisode:
          type: string
          example: "06"
        airTime:
          type: string
          example: "周五21:35后"
        views:
          type: integer
          example: 110626
        rating:
          type: number
          example: 8.5

    # ---- 番剧详情 ----
    AnimeDetailResult:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          $ref: "#/components/schemas/AnimeDetail"

    AnimeDetail:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "关于邻家的天使大人不知不觉把我惯成了废人这档子事 第二季"
        altTitle:
          type: string
          nullable: true
          description: 别名/日文名
          example: "お隣の天使様にいつの間にか駄目人間にされていた件 2期"
        description:
          type: string
          nullable: true
          description: 完整简介
        coverUrl:
          type: string
          nullable: true
          example: "https://img.animerce.com/cover/001.jpg"
        bannerUrl:
          type: string
          nullable: true
          example: "https://img.animerce.com/banner/001.jpg"
        type:
          type: string
          nullable: true
          example: "TV番组"
        status:
          type: string
          example: "ongoing"
        episodeCount:
          type: integer
          nullable: true
          example: 12
        latestEpisode:
          type: string
          nullable: true
          example: "06"
        airTime:
          type: string
          nullable: true
          example: "周五21:35后"
        views:
          type: integer
          example: 110626
        rating:
          type: number
          nullable: true
          example: 8.5
        year:
          type: integer
          nullable: true
          example: 2026
        season:
          type: string
          nullable: true
          example: "2026春"
        tags:
          type: string
          nullable: true
          description: 逗号分隔的标签
          example: "恋爱,日常,轻小说改"
        episodes:
          type: array
          description: 分集列表，按集数正序排列
          items:
            $ref: "#/components/schemas/EpisodeItem"

    EpisodeItem:
      type: object
      properties:
        number:
          type: integer
          description: 第几话
          example: 1
        title:
          type: string
          nullable: true
          description: 话标题
          example: "第一话 新的开始"
        url:
          type: string
          nullable: true
          description: 视频播放地址(m3u8/mp4)
          example: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"

    # ---- 搜索结果 ----
    SearchResultItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
